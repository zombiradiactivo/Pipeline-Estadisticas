name: Pipeline Multi-Etapa Estadísticas
on:
  push:   { branches: [main] }
  pull_request: { branches: [main] }


jobs:
# ─── ETAPA 1: Análisis estático ───────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install flake8
      - name: 🔍 Análisis estático flake8
        run: flake8 src/ --max-line-length=100


# ─── ETAPA 2: Tests unitarios ─────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    needs: lint                       # solo corre si lint pasa
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: 
          python-version: ${{ matrix.python-version }}
      - run: pip install -r requirements.txt
      - name: 🧪 Tests unitarios con cobertura ≥ 85%
        run: python -m pytest tests/test_api.py tests/test_estadisticas.py tests/test_graficos.py
               -v --cov=src --cov-fail-under=85


# ─── ETAPA 3: Tests de integración ───────────────────────────
  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests                 # solo corre si unit-tests pasa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install -r requirements.txt
      - name: 🔗 Tests de integración API Flask
        run: python -m pytest tests/test_api.py -v


# ─── ETAPA 4: Seguridad con bandit ───────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install bandit
      - name: 🔒 Análisis de seguridad bandit
        run: bandit -r src/ -ll          # -ll: solo errores medium/high

